<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=bsvs_school.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSVS Vidyalayam Golagamudi</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #050f2e 0%, #0a1f5c 40%, #1a3a9c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .box {
      text-align: center;
      padding: 3rem;
    }
    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .logo span {
      background: linear-gradient(135deg, #c8a84b, #e6c96a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #c8a84b, #e6c96a);
      color: #0a1f5c;
      font-weight: 800;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(200,168,75,0.2);
      border-top-color: #c8a84b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <div class="logo">BSVS <span>Vidyalayam</span></div>
    <p>Golagamudi, Anikepalle Mandal, Nellore · AP – 524321</p>
    <p style="font-size:0.85rem;margin-bottom:1.5rem;">Redirecting to school website...</p>
    <a href="bsvs_school.html">Open Website →</a>
  </div>
  <script>
    setTimeout(() => { window.location.href = 'bsvs_school.html'; }, 800);
  </script>
</body>
</html>
